name: Docker Build & Push

on:
  push:
    branches: [main] # main 브랜치에 푸시될 때마다 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Github가 제공하는 가상 컴퓨터 (Ubuntu에서 실행)

    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 빌드 및 푸시
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.prod # 아까 만든 배포용 도커파일 사용
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bookshelf-prod:latest # 태그 지정
          build-args: | # 빌드 시 환경 변수 주입
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
